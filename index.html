<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abgefahrene adjektive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="words" id="words"></div>

  <form id="add-form">
    <input type="text" id="new-adj" placeholder="neues adjektiv" maxlength="80" required>
    <button type="submit">+</button>
  </form>

  <script>
    // ---- just edit this list ----
    const adjektive = [
      'schwindelerregend',
      'himmelschreiend',
      'blümerant',
      'kapuzenförmig',
      'trojanisch',
      'thixotrop',
      'kategorisch',
      'kafkaesk',
      'aufgeblasen',
      'angagiert',
      'frittig',
      'flott',
      'tiefgekühlt',
      'fabriziös',
      'kapriziös',
      'verspendet',
      'farbenleer',
      'artifiziell',
      'stakkatoartig',
      'prätentiös',
      'pathetisch',
      'nonchalant',
      'flam­bo­y­ant',
      'genüsslich',
      'renitent',
      'müßig',
      'aphrodisierent',
      'fesch',
      'arbeitswütig',
      'pittoresk',
      'schnodderig',
      'schnieke',
      'quietschfidel',
      'penetrant',
      'bemerkenswert',
      'viskos',
      'ionisiert',
      'löchrig',
      'paranormal',
      'intrazellulär',
      'interstellar',
      'deliziös',
      'kegelig',
      'luftpolsterfoliert',
      'reserviert',
      'eloquent',
      'dröge',
      'ländlich', 
      'melodiös',
      'persistent',
      'suverän',
      'gemächlich',
      'hartnäckig',
      'kompromisslos',
      'resolut'
    ].map(w => ({ word: w, count: 1 }));
    // ----------------------------

    const wordsEl = document.getElementById('words');
    const form = document.getElementById('add-form');
    const input = document.getElementById('new-adj');

    function spawnShards(span) {
      const rect = span.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const count = 8 + Math.floor(Math.random() * 5);

      for (let i = 0; i < count; i++) {
        const shard = document.createElement('span');
        shard.className = 'bubble-shard';
        const size = 3 + Math.random() * 5;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const dist = 30 + Math.random() * 40;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        Object.assign(shard.style, {
          width: size + 'px',
          height: size + 'px',
          left: (cx - size / 2) + 'px',
          top: (cy - size / 2) + 'px',
          position: 'fixed',
          animationName: 'shard-fly',
          animationDuration: (0.3 + Math.random() * 0.3) + 's',
        });
        shard.style.setProperty('--tx', tx + 'px');
        shard.style.setProperty('--ty', ty + 'px');
        document.body.appendChild(shard);
        shard.addEventListener('animationend', () => shard.remove(), { once: true });
      }
    }

    function pop(span, index) {
      spawnShards(span);
      span.classList.add('pop');
      span.addEventListener('animationend', () => {
        adjektive.splice(index, 1);
        render();
      }, { once: true });
    }

    function render() {
      wordsEl.innerHTML = '';
      adjektive.forEach((item, i) => {
        const span = document.createElement('span');
        span.className = 'adj';
        span.textContent = item.word;
        const scale = 1 + (item.count - 1) * 0.2;
        span.style.setProperty('--s', scale);
        span.addEventListener('click', () => pop(span, i));
        wordsEl.appendChild(span);
      });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = input.value.trim();
      if (!value) return;

      const existingIndex = adjektive.findIndex(item =>
        item.word.toLowerCase() === value.toLowerCase()
      );

      if (existingIndex !== -1) {
        adjektive[existingIndex].count++;
        const spans = wordsEl.querySelectorAll('.adj');
        const span = spans[existingIndex];

        if (adjektive[existingIndex].count > 5) {
          pop(span, existingIndex);
        } else {
          const scale = 1 + (adjektive[existingIndex].count - 1) * 0.2;
          span.style.setProperty('--s', scale);
        }
      } else {
        adjektive.push({ word: value, count: 1 });
        render();
      }

      input.value = '';
    });

    render();
  </script>
</body>
</html>
