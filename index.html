<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abgefahrene adjektive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="words" id="words"></div>

  <form id="add-form">
    <input type="text" id="new-adj" placeholder="neues adjektiv" maxlength="80" required>
    <button type="submit">+</button>
  </form>

  <script>
    // ---- just edit this list ----
    const adjektive = [
      'schwindelerregend',
      'himmelschreiend',
      'blümerant',
      'kapuzenförmig',
      'trojanisch',
      'thixotrop',
      'kategorisch',
      'kafkaesk',
      'aufgeblasen',
      'angagiert',
      'frittig',
      'flott',
      'tiefgekühlt',
      'fabriziös',
      'kapriziös',
      'verspendet',
      'farbenleer',
      'artifiziell',
      'stakkatoartig',
      'prätentiös',
      'pathetisch',
      'nonchalant',
      'flam­bo­y­ant',
      'genüsslich',
      'renitent',
      'müßig',
      'aphrodisierent',
      'fesch',
      'arbeitswütig',
      'pittoresk',
      'schnodderig',
      'schnieke'
    ];
    // ----------------------------

    const wordsEl = document.getElementById('words');
    const form = document.getElementById('add-form');
    const input = document.getElementById('new-adj');

    function render() {
      wordsEl.innerHTML = '';
      adjektive.forEach((w) => {
        const span = document.createElement('span');
        span.className = 'adj';
        span.textContent = w;
        wordsEl.appendChild(span);
      });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = input.value.trim();
      if (!value) return;
      adjektive.push(value);
      render();
      input.value = '';
    });

    render();
  </script>
</body>
</html>
